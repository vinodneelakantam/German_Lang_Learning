<!DOCTYPE html>

<title>Full EN-DE Trainer</title>

<style>
body { font-family: Arial; margin:20px; }
.lesson { margin-top:40px; }
.row { padding:6px; border-bottom:1px solid #ddd; }
button { margin-left:5px; }
.nav { position:fixed; right:10px; top:10px; }
</style>

<script>
let rate = 0.9;

function speak(text, lang){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = rate;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function setSpeed(v){ rate = v; }

function playLesson(list){
  let i=0;
  function run(){
    if(i<list.length){
      speak(list[i][0],'en-US');
      setTimeout(()=>{
        if(list[i][1]) speak(list[i][1],'de-DE');
        i++;
        setTimeout(run,1500);
      },1200);
    }
  }
  run();
}
</script>

</head>
<body>

<div class="nav">
Speed:
<select onchange="setSpeed(this.value)">
<option value="0.6">Slow</option>
<option value="0.9" selected>Normal</option>
<option value="1.2">Fast</option>
</select>
</div>

<script>
Object.keys(lessons).forEach(name => {
  document.body.innerHTML += `<div class="lesson">
  <h2>${name}</h2>
  <button onclick="playLesson(lessons['${name}'])">▶ Play Lesson</button>
  <div id="${name}"></div>
  </div>`;

  lessons[name].forEach(p=>{
    document.getElementById(name).innerHTML += `
    <div class="row">
      ${p[0]} 
      <button onclick="speak('${p[0]}','en-US')">EN</button>
      ${p[1] ? `— ${p[1]} <button onclick="speak('${p[1]}','de-DE')">DE</button>` : ''}
    </div>`;
  });
});
