<script>
const immigrantTemplates = [
  ['I need {en}', 'Ich brauche {de}'],
  ['Where can I find {en}', 'Wo finde ich {de}'],
  ['Do you have {en}', 'Haben Sie {de}']
];

function buildLessons(topic, terms) {
  const expandedRows = [];
  terms.forEach(([en, de]) => {
    expandedRows.push([en, de]);
    immigrantTemplates.forEach(([enTemplate, deTemplate]) => {
      expandedRows.push([
        enTemplate.replace('{en}', en),
        deTemplate.replace('{de}', de)
      ]);
    });
  });

  const lessons = [];
  const chunkSize = 50;
  for (let i = 0; i < expandedRows.length; i += chunkSize) {
    lessons.push({
      name: `${topic} ${String(i / chunkSize + 1).padStart(2, '0')}`,
      entries: expandedRows.slice(i, i + chunkSize)
    });
  }
  return lessons;
}

window.CHAPTER_CONFIG = {
  title: 'Listening 04: Work and Jobs',
  subtitle: 'Listening practice for employment and workplace vocabulary with useful sentence patterns.',
  signature: {
    name: 'Vinod Kumar Neelakantam',
    linkText: 'linkedin.com/in/vinodneelakantam',
    linkHref: 'https://www.linkedin.com/in/vinodneelakantam/'
  },
  categories: [
    {
      title: 'Category: Work and Jobs',
      description: 'Practical job and office terms for daily life in Germany.',
      lessons: buildLessons('Work and Jobs', [
        ['job interview', 'Vorstellungsgespraech'],
        ['resume', 'Lebenslauf'],
        ['work permit', 'Arbeitserlaubnis'],
        ['employment contract', 'Arbeitsvertrag'],
        ['salary', 'Gehalt'],
        ['tax class', 'Steuerklasse'],
        ['payslip', 'Lohnabrechnung'],
        ['overtime', 'Ueberstunden'],
        ['vacation days', 'Urlaubstage'],
        ['sick leave', 'Krankmeldung'],
        ['colleague', 'Kollege'],
        ['manager', 'Vorgesetzter'],
        ['shift', 'Schicht'],
        ['part time job', 'Teilzeitjob'],
        ['full time job', 'Vollzeitjob'],
        ['job center', 'Jobcenter'],
        ['application', 'Bewerbung'],
        ['reference', 'Arbeitszeugnis'],
        ['probation period', 'Probezeit'],
        ['training course', 'Fortbildung']
      ])
    }
  ]
};
</script>
