            ['Where can I get information?', 'Wo kann ich Informationen bekommen?'],
            ['I need this in German.', 'Ich brauche das auf Deutsch.'],

        }
      ]

        ['Hello, where can I find rice?', 'Hallo, wo finde ich Reis?'],
        ['Aisle five, next to pasta.', 'Gang fuenf, neben den Nudeln.'],
