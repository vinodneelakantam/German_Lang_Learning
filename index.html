<script>
let rate = 0.9;
let playbackActive = false;
let playbackTimerA = null;
let playbackTimerB = null;

function say(text, lang, cancelFirst){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = rate;
  if(cancelFirst) window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function speak(text, lang){
  say(text, lang, true);
}

function setSpeed(v){ rate = v; }

function clearPlaybackTimers(){
  if(playbackTimerA) clearTimeout(playbackTimerA);
  if(playbackTimerB) clearTimeout(playbackTimerB);
  playbackTimerA = null;
  playbackTimerB = null;
}

function setPlaybackStatus(message){
  const label = document.getElementById('playbackStatus');
  if(label) label.textContent = message;
}

function stopPlayback(){
  playbackActive = false;
  clearPlaybackTimers();
  window.speechSynthesis.cancel();
  setPlaybackStatus('Stopped');
}

function playLesson(list, lessonName, categoryTitle){
  stopPlayback();
  playbackActive = true;
  const label = categoryTitle ? `${categoryTitle} • ${lessonName}` : lessonName;
  setPlaybackStatus(`Playing ${label}`);

  if(categoryTitle){
    say(`Category ${categoryTitle}`, 'en-US', false);
  }

  let i=0;
  function run(){
    if(!playbackActive) return;

    if(i<list.length){
      say(list[i][0], 'en-US', false);
      playbackTimerA = setTimeout(()=>{
        if(!playbackActive) return;
        if(list[i][1]) say(list[i][1], 'de-DE', false);
        i++;
        playbackTimerB = setTimeout(run,1500);
      },1200);
    } else {
      playbackActive = false;
      setPlaybackStatus(`Completed ${label}`);
    }
  }

  playbackTimerB = setTimeout(run, categoryTitle ? 1200 : 0);
}

function playRolePlay(dialog, title){
  stopPlayback();
  playbackActive = true;
  setPlaybackStatus(`Role Play: ${title}`);

  let i = 0;
  function run(){
    if(!playbackActive) return;

    if(i < dialog.length){
      const en = dialog[i][0] || '';
      const de = dialog[i][1] || '';

      if(en) say(en, 'en-US', false);

      playbackTimerA = setTimeout(() => {
        if(!playbackActive) return;
        if(de) say(de, 'de-DE', false);
        i++;
        playbackTimerB = setTimeout(run, 1700);
      }, 1400);
    } else {
      playbackActive = false;
      setPlaybackStatus(`Completed role play: ${title}`);
    }
  }

  run();
}
</script>

    ["delivery tracking", "Sendungsverfolgung"],
    ["email", "E Mail"],
    ["password", "Passwort"],
    ["customer hotline", "Kundenhotline"],
    ["appointment confirmation", "Terminbestaetigung"],
    ["public library", "Stadtbibliothek"],
    ["community center", "Gemeindezentrum"],
    ["language exchange", "Sprachtandem"],
    ["volunteer work", "Ehrenamt"],
    ["religious center", "Gebetszentrum"],
    ["legal advice", "Rechtsberatung"],
    ["support group", "Selbsthilfegruppe"],
    ["translation app", "Uebersetzungs App"],
    ["emergency contact", "Notfallkontakt"]
  ]
};

const immigrantTemplates = [
  ["I need {en}", "Ich brauche {de}"],
  ["I am looking for {en}", "Ich suche {de}"],
  ["Where can I find {en}", "Wo finde ich {de}"],
  ["Do you have {en}", "Haben Sie {de}"]
];

const generatedLessonGroups = {};
let generatedLessonIndex = 1;

Object.entries(immigrantEssentialTerms).forEach(([topic, terms]) => {
  const expandedRows = [];

  terms.forEach(([en, de]) => {
    expandedRows.push([en, de]);

    immigrantTemplates.forEach(([enTemplate, deTemplate]) => {
      expandedRows.push([
        enTemplate.replace('{en}', en),
        deTemplate.replace('{de}', de)
      ]);
    });
  });

  const lessonNames = [];
  const chunkSize = 50;
  for(let i = 0; i < expandedRows.length; i += chunkSize){
    const lessonName = `Immigrant Essentials ${String(generatedLessonIndex).padStart(2, '0')}`;
    lessons[lessonName] = expandedRows.slice(i, i + chunkSize);
    lessonNames.push(lessonName);
    generatedLessonIndex++;
  }

  generatedLessonGroups[topic] = lessonNames;
});
</script>

<script>

function renderLessonCard(name){
  const lessonEntries = lessons[name].map((p) => {
    const enCell = `<td class="speak-cell english" onclick="speak('${esc(p[0])}','en-US')">${p[0]}</td>`;
    const deCell = p[1]
      ? `<td class="speak-cell german" onclick="speak('${esc(p[1])}','de-DE')">${p[1]}</td>`
      : '<td></td>';

    return `<tr>${enCell}${deCell}</tr>`;
  }).join('');

  return `
  <div class="lesson">
    <div class="lesson-head">
      <div>
        <button class="play-btn" onclick="playLesson(lessons['${esc(name)}'],'${esc(name)}','${esc(lessonToCategory[name] || '')}')">▶ Play</button>
        <button class="stop-btn" onclick="stopPlayback()">Stop</button>
      </div>
    </div>
    <div class="entries">
      <table class="vocab-table">
        <thead>
          <tr>
            <th>English</th>
            <th>German</th>
          </tr>
        </thead>
        <tbody>
          ${lessonEntries}
        </tbody>
      </table>
    </div>
  </div>`;
}

  const cards = section.lessons

    .map(name => renderLessonCard(name))
    .join('');

    container.innerHTML += `
    <section class="category">

});
